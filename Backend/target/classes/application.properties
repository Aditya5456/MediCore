# ─────────────────────────────────────────────
#  SERVER
# ─────────────────────────────────────────────
server.port=8080
spring.application.name=hospital-backend

# ─────────────────────────────────────────────
#  DATABASE  (MySQL)
#  Change host/port/username/password as needed
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/HospitalDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=bdms_project
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP – bundled with Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─────────────────────────────────────────────
#  JPA / HIBERNATE
# ─────────────────────────────────────────────
# validate  → checks schema matches entities  (use in production)
# update    → auto-alters tables              (safe for development)
# create    → drops & recreates on startup    (use only for first run)
# none      → does nothing                    (use when SQL is managed manually)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─────────────────────────────────────────────
#  JACKSON (JSON serialization)
# ─────────────────────────────────────────────
# Don't serialize null fields → cleaner API responses
spring.jackson.default-property-inclusion=non_null
# ISO-8601 date format  e.g.  "2025-03-10"
spring.jackson.serialization.write-dates-as-timestamps=false

# ─────────────────────────────────────────────
#  LOGGING
# ─────────────────────────────────────────────
logging.level.com.hospital=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO
